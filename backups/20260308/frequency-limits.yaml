    template: "templates/auto-tasks/ai-deep-research.md"
    template_version: 1
    history_type: "ai_deep_research"
    execution_order: 6
    skills: [knowledge-query, hackernews-ai-digest, web-research, kb-research-strategist, groq]
    description: "每日規劃一個 AI 技術深度研究，分 4 階段完成（規劃→蒐集→分析→報告）"
    stages:
      1: "規劃：選定主題、定義研究問題、設計方法論"
      2: "蒐集：WebSearch + WebFetch 取得 5+ 篇資料"
      3: "分析：交叉比對、找出共識與分歧、提煉洞見"
      4: "報告：撰寫完整研究報告並匯入知識庫"

  unsloth_research:
    name: "Unsloth 研究"
    daily_limit: 0
    counter_field: "unsloth_research_count"
    template: "templates/auto-tasks/unsloth-research.md"
    template_version: 1
    history_type: "unsloth_research"
    execution_order: 7
    skills: [knowledge-query, web-research]
    description: "研究 Unsloth LLM fine-tuning 框架的最新技術、最佳實踐、與其他工具比較"

  ai_github_research:
    name: "AI GitHub 熱門專案研究"
    daily_limit: 1
    counter_field: "ai_github_research_count"
    template: "templates/auto-tasks/ai-github-research.md"
    template_version: 1
    history_type: "ai_github_research"
    execution_order: 8
    skills: [knowledge-query, web-research, github-scout, kb-research-strategist]
    model: "claude-sonnet-4-5"
    description: "研究 AI 相關 GitHub 熱門專案，分析架構與應用，將報告寫入 RAG 知識庫"

  ai_smart_city:
    name: "AI 智慧城市研究"
    daily_limit: 0
    counter_field: "ai_smart_city_count"
    template: "templates/auto-tasks/ai-domain-research.md"  # P1-D: 改用共用參數化模板
    template_version: 2
    history_type: "ai_smart_city"
    execution_order: 9
    skills: [knowledge-query, web-research, kb-research-strategist]
    description: "研究 AI 應用於智慧城市（交通、能源、公共安全、環境監測等），將報告寫入 RAG 知識庫"
    template_params:
      domain_name: "AI 智慧城市"
      model: "claude-haiku-4-5"
      task_type: "ai_smart_city"
      search_terms: ["AI 智慧城市 smart city", "智慧城市 AI 應用"]
      kb_search_en: "AI smart city urban computing"
      topic_list: |
        - **智慧交通**：AI 號誌控制、自動駕駛、交通流量預測、MaaS 平台
        - **智慧能源**：AI 電網調度、再生能源預測、建築能耗優化、碳排監測
        - **公共安全**：AI 影像監控、犯罪預測、災害預警、緊急救援調度
        - **環境監測**：AI 空氣品質預測、水質監測、噪音地圖、廢棄物管理
        - **智慧治理**：AI 政策模擬、市民服務聊天機器人、公文自動分類
        - **智慧醫療**：AI 疫情預測、遠距醫療、公共衛生決策支援
        - **數位孿生**：城市數位孿生建模、即時模擬、情境分析
        - **台灣案例**：屏東/高雄/台北智慧城市應用實例
      kb_tags: '["AI", "智慧城市", "smart-city"]'
      quality_checks: |
        1. 是否包含具體案例（不只是概念描述）？
        2. 是否涵蓋台灣視角？
        3. 內容是否超過 400 字？
      quality_note: "請結合台灣在地視角，並關注可落地的應用場景。"

  ai_sysdev:
    name: "AI 系統開發研究"
    daily_limit: 1
    counter_field: "ai_sysdev_count"
    template: "templates/auto-tasks/ai-domain-research.md"  # P1-D: 改用共用參數化模板
    template_version: 2
    history_type: "ai_sysdev"
    execution_order: 10
    skills: [knowledge-query, web-research, kb-research-strategist]
    description: "研究 AI 應用於系統開發（AI-assisted coding、自動測試、架構優化、DevOps 智能化），將報告寫入 RAG 知識庫"
    template_params:
      domain_name: "AI 系統開發"
      task_type: "ai_sysdev"
      search_terms: ["AI 系統開發 software engineering", "AI 輔助開發"]
      kb_search_en: "AI software development LLM coding"
      topic_list: |
        - **AI-Assisted Coding**：Copilot/Cursor/Claude Code 最佳實踐、Prompt Engineering for Code
        - **自動測試生成**：AI 生成單元測試、E2E 測試、Mutation Testing 自動化
        - **架構優化**：AI 驅動的架構決策、程式碼品質分析、技術債檢測
        - **DevOps 智能化**：AI 日誌分析、自動 incident response、智能監控告警
        - **程式碼審查**：AI Code Review、漏洞自動偵測、風格一致性檢查
        - **需求工程**：AI 需求分析、使用者故事生成、驗收條件自動化
        - **持續整合**：AI 驅動的 CI/CD 優化、構建時間預測、flaky test 偵測
        - **Agent 開發**：Claude Agent SDK、Multi-Agent 系統、Tool Use 設計模式
        - **文件生成**：AI 自動文件化、API 文件生成、變更日誌自動化
      kb_tags: '["AI", "系統開發", "software-engineering"]'
      quality_checks: |
        1. 是否包含可執行的工作流程（不只是概念）？
        2. 是否有程式碼或配置範例？
        3. 內容是否超過 400 字？
      quality_note: "請聚焦可落地的工作流程，非純概念。"

