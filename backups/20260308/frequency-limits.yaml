# ============================================================
# 每日上限摘要
# ============================================================
# 佛學研究：楞嚴經(1) + 教觀綱宗(1) + 法華經(1) + 淨土宗(1) = 4
# AI/技術：任務技術(1) + AI深度(4) + Unsloth(0) + AI GitHub(1) + AI智慧城市(0) + AI系統開發(1) = 7
# 系統優化：Skill審查(1) = 1
# 系統維護：Log審查(1) + Git推送(1) = 2
# 遊戲創意：創意遊戲優化(0) = 0
# 專案品質：QA優化(0) = 0
# 系統自省：系統洞察(1) + 自癒迴圈(1) = 2
# Chatroom 整合：品質優化(1) = 1
# AI 工作流自動化：GitHub 研究(1) = 1
# GitHub 靈感：靈感蒐集(0) = 0
# 合計：18 次/日

# 歷史追蹤寫入規則
history:
  max_auto_tasks: 200   # auto_tasks 陣列上限，超過移除最舊的
  max_daily_summary: 30  # daily_summary 陣列上限

# 全部達上限時
all_exhausted_action: "直接跳到通知步驟（通知：今日自動任務已達上限）"
