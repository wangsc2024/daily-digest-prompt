# 最小 CI（ADR-013）：push to main 觸發 pytest + pip-audit
# 不包含 deployment；secrets 僅在需 API 時由 repo 設定

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run pytest (hooks)
        run: uv run pytest tests/hooks/ -v --tb=short

      - name: Run pip-audit
        run: uv run pip-audit
