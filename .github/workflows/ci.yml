# 最小 CI（ADR-013）：push to main 觸發 pytest + pip-audit
# 不包含 deployment；secrets 僅在需 API 時由 repo 設定

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run ruff lint
        run: uv run ruff check hooks/ tools/ tests/

      # hooks 套件：量 hooks/ 覆蓋率，門檻 45%
      - name: Run pytest (hooks)
        run: uv run pytest tests/hooks/ --cov=hooks --cov-report=term-missing --cov-fail-under=45 --tb=short -q

      # skills 套件：只量 skills/ 覆蓋率，門檻 60%
      # （ntfy_client 99%、kb_search 97%、todoist API 57%、gmail_client 55%，整體 ~68%）
      - name: Run pytest (skills)
        run: uv run pytest tests/skills/ --cov=skills --cov-report=term-missing --cov-fail-under=60 --tb=short -q

      # tools 套件：整合測試，不設覆蓋率門檻（測試真實外部呼叫）
      - name: Run pytest (tools)
        run: uv run pytest tests/tools/ --tb=short -q

      - name: Run pytest (long-term-memory)
        run: uv run pytest tests/test_memory_long_term_optimization.py tests/test_digest_scheduler.py --cov=memory --cov=digest_scheduler --cov-report=term-missing --cov-fail-under=85 --tb=short -q

      - name: Run pip-audit
        run: uv run pip-audit
