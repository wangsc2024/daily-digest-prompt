# config/notification.yaml
# ntfy 通知配置
# 修改此文件可調整通知行為，不需碰 prompt

# 配置版本
version: 1
# 預設訂閱主題（ntfy.sh 訂閱用）
default_topic: "wangsc2025"
# ntfy 服務網址（自架可改）
service_url: "https://ntfy.sh"
# 單則訊息長度上限（字元，超過需截斷）
max_message_length: 500

# 發送步驟（Windows 環境必須用 JSON 檔案方式，避免 inline JSON 亂碼）
send_steps:
  1: "用 Write 工具建立 ntfy_temp.json（UTF-8）"
  2: 'curl -H "Content-Type: application/json; charset=utf-8" -d @ntfy_temp.json https://ntfy.sh'
  3: "rm ntfy_temp.json"

# 通知 tags 映射
tag_mappings:
  # 每日摘要
  digest_success: ["white_check_mark", "memo"]
  digest_warning: ["warning", "memo"]

  # Todoist Agent
  todoist_success: ["white_check_mark"]
  todoist_no_tasks_auto_done: ["books", "wrench"]  # 無待辦 + 自動任務完成
  todoist_no_tasks: ["information_source"]          # 無待辦 + 自動任務失敗/跳過
  todoist_all_failed: ["warning"]

  # 系統告警（on_stop_alert.py）
  security_alert: ["warning", "skull_and_crossbones"]

# Todoist Agent 通知內容模板
todoist_report: |
  📋 Todoist 自動執行報告

  📊 統計
  - 待辦總數：N 項
  - 已執行：N 項（成功 N / 失敗 N）
  - 已跳過：N 項
  - 驗證通過率：XX%
  - 平均迭代次數：N.N 次
  - 一次通過率：XX%

  ✅ 已完成（含迭代品質）
  1. [任務名稱] — Tier N (信心度 XX%) | Skill: [...] | 迭代: N/3 | 品質: N/5

  ❌ 執行失敗（如有，含精練追蹤）
  1. [任務名稱] — 迭代: N/3 次 | 最終: {cert_status} | 殘留: [...] | 處置: 降級+延遲至明天

  ⏭️ 已跳過（如有）
  - [任務名稱]：跳過原因

  🔧 Skill 使用統計
  - 路由：標籤 N 項 / 關鍵字 N 項 / 語義 N 項
  - 本次匹配 N 個 Skill，實際使用 M 個

  ⚠️ Skill 同步提醒（如有未匹配標籤）
  - 未匹配標籤：[列表]
  - 建議更新 config/routing.yaml

# 每日摘要通知模板
daily_digest:
  title_template: "每日摘要 | {date}"
  sections: [todoist, news, hackernews, habits, zen]
  priority: 3
  tags: ["white_check_mark", "memo"]

# 研究完成通知模板
research_complete:
  title_template: "研究完成 | {topic}"
  priority: 3
  tags: ["books", "research"]

# 系統洞察通知模板
system_insight:
  title_template: "系統洞察 | {date}"
  priority: 2
  tags: ["gear", "chart_with_upwards_trend"]

# Harness 告警配置（on_stop_alert.py 讀取；抑制頻率與冷卻）
harness_alerts:
  # 團隊模式整合
  team_mode_wait_seconds: 30   # 等待所有 Agent 完成的時間窗口（秒）

  # 通知抑制（避免疲勞）
  suppression:
    max_alerts_per_hour: 5     # 每小時最多 5 則告警
    cooldown_minutes: 30       # 相同問題 30 分鐘冷卻期
