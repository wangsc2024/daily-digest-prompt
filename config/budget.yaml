# LLM 用量預算配置（對應 Paperclip 的原子化預算治理）
# 關聯：tools/budget_guard.py、tools/llm_router.py
version: 1

daily_budget:
  claude_tokens: 12_000_000      # 每日 Claude token 上限（估算值，字元 ÷ 3.5）
  groq_calls: 100                # 每日 Groq API 呼叫上限（免費方案）
  warn_threshold: 0.80           # 80% 時發送 ntfy 告警
  suspend_threshold: 1.00        # 100% 時暫停新呼叫（circuit breaker）

monthly_budget:
  claude_tokens: 100_000_000     # 月度 Claude token 上限
  warn_threshold: 0.80

per_task_limits:                 # 各任務類型單次估算 token 上限（用於 check_budget 預估）
  research_synthesis: 8192
  arch_evolution: 4096
  system_insight: 4096
  podcast_create: 8192
  default: 2000

cost_tracking:                   # 成本估算（供財務監控，USD）
  claude_sonnet_per_1m_input: 3.00
  claude_sonnet_per_1m_output: 15.00
  groq_llama_8b_per_1m: 0.05
