# 健康分數計算規則（文件驅動，修改此處不需動腳本）
# 使用方式：query-logs.ps1 -Mode health-score 讀取此檔計算加權分數
# 引用者：query-logs.ps1、check-health.ps1
version: 1

# 分數區間 — 決定健康等級標籤與星級顯示
# 規則：由高至低匹配，取第一個 min ≤ 分數 的區間
ranges:
  - { min: 90, label: "優秀", stars: 5 }  # 所有維度表現穩定
  - { min: 75, label: "良好", stars: 4 }  # 偶有小問題但整體健康
  - { min: 60, label: "尚可", stars: 3 }  # 有明確改善空間
  - { min: 40, label: "不佳", stars: 2 }  # 多項指標異常
  - { min: 0, label: "嚴重", stars: 1 }   # 需立即介入

# 各維度權重（合計 100）
# 計算公式：總分 = Σ(維度分數 × weight / 100)
# 維度分數由 query-logs.ps1 從 JSONL 結構化日誌統計得出
dimensions:
  success_rate:
    weight: 30       # 最高權重：排程是否如期完成是核心指標
    description: "排程成功率"
  error_rate:
    weight: 20       # 工具呼叫錯誤頻率（含 Hook 攔截後的重試）
    description: "工具錯誤率"
  blocked_events:
    weight: 15       # Hook 攔截的違規操作次數（越少越好）
    description: "違規攔截事件"
  cache_hit_rate:
    weight: 15       # API 快取命中率（目標 ≥40%，見 config/slo.yaml）
    description: "快取命中率"
  duration_stability:
    weight: 10       # 執行耗時的變異係數（越穩定越好）
    description: "耗時穩定度"
  streak_continuity:
    weight: 10       # 連續無中斷執行天數（反映系統穩定性）
    description: "連續執行天數"
