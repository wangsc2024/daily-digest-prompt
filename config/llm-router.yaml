# LLM 路由配置
# 定義哪些任務類型路由到 Groq（快速/低成本），哪些保留給 Claude（複雜推理）
#
# 關聯組件：
#   - skills/groq/SKILL.md       → Agent 使用 Groq 的操作指南
#   - bot/groq-relay.js          → Relay 服務（持有 API KEY）
#   - prompts/team/fetch-hackernews.md  → 使用 en_to_zh 規則
#   - prompts/team/fetch-news.md        → 使用 news_summary 規則

version: 2

categories:
  quick_summary:
    description: "快速摘要/分類：低成本、低延遲"
    preferred_provider: groq
    max_tokens: 500
    model: llama-3.1-8b-instant
  deep_research:
    description: "深度研究/長文合成：需要完整上下文理解"
    preferred_provider: claude
    max_tokens: 4000
    model: claude-sonnet-4-6
  complex_analysis:
    description: "複雜分析/政策/安全：高精準需求"
    preferred_provider: claude
    max_tokens: 2000
    model: claude-sonnet-4-6
  translation:
    description: "翻譯類任務：保留術語原文"
    preferred_provider: groq
    max_tokens: 800
    model: llama-3.1-8b-instant

providers:
  groq:
    endpoint: http://localhost:3002/groq/chat
    health_check: http://localhost:3002/groq/health
    model: llama-3.1-8b-instant
    timeout_s: 20
    max_tokens: 2048
    rate_limit_per_min: 2           # 更保守策略（免費方案 5 req/min），降至 2 避免並行觸發配額超限
    cache_ttl_min: 5                # Relay 端快取 TTL（分鐘）
    fallback_on_error: true         # 失敗時降級，不中斷主流程

  claude:
    description: 當前執行的 Claude Code Agent（預設行為，無需額外配置）
    fallback_for: [groq]            # Groq 失敗時的備援

# 任務類型 → LLM Provider 映射
routing_rules:

  # ── 路由到 Groq（快速、結構化、低成本）─────────────────────
  news_summary:
    provider: cursor_cli
    model: composer-2-fast
    mode: summarize
    max_tokens: 200
    category: quick_summary
    description: 新聞標題或段落一句話摘要
    used_by: [fetch-news.md]
    max_input_chars: 500            # 每則新聞的摘要輸入上限

  en_to_zh:
    provider: groq_direct           # tools/groq_direct.py 直呼 Groq API，金鑰讀 bot/.env
    mode: translate
    max_tokens: 500
    category: translation
    description: 英文技術文章標題轉正體中文，保留技術術語原文
    used_by: [fetch-hackernews.md]
    max_input_chars: 300            # 單篇標題上限

  topic_classify:
    provider: groq
    mode: classify
    groq_mode: classify
    max_tokens: 100
    category: quick_summary
    description: 為文章或任務自動打主題標籤（JSON 輸出）
    used_by: []                     # 目前未在 prompt 中使用，預留

  quick_extract:
    provider: groq
    mode: extract
    groq_mode: extract
    max_tokens: 300
    category: quick_summary
    description: 從非結構化文字萃取關鍵資訊（JSON 輸出）
    used_by: []                     # 預留

  kb_content_score:
    provider: claude_haiku
    model: claude-haiku-4-5-20251001
    mode: classify
    max_tokens: 150
    category: quick_summary
    description: 知識庫筆記內容品質語義評分（概念數、深度、密度、是否知識）
    used_by: [skills/kb-curator/SKILL.md]
    max_input_chars: 2000           # 取 contentText 前 2000 字
    config_ref: config/kb-content-scoring.yaml

  todoist_query_simple:
    provider: groq
    mode: extract
    groq_mode: extract              # P3-C ToolOrchestra 簡易查詢
    max_tokens: 500
    category: quick_summary
    description: Todoist 任務簡易查詢格式化（關鍵字提取 + 優先級初步判斷）
    used_by: []                     # P3-C 啟用後使用

  # ── 保留給 Claude（深度推理、隱私、安全）──────────────────────
  policy_analysis:
    provider: claude
    category: complex_analysis
    rationale: 需要深度語境理解與政策背景知識
    description: 屏東政策深度解讀
    used_by: [assemble-digest.md, prompts/team/fetch-news.md]

  code_review:
    provider: claude
    category: complex_analysis
    rationale: 程式碼品質評估需要複雜推理
    description: 程式碼審查與修正建議
    used_by: [templates/sub-agent/code-task.md]

  kb_import:
    provider: claude
    category: complex_analysis
    rationale: 語意去重需要 Claude 的語言理解能力
    description: 知識庫匯入前的品質評估與重複性判斷
    used_by: [skills/kb-curator/SKILL.md]

  research_synthesis:
    provider: claude
    category: deep_research
    rationale: 需要複雜推理+長上下文融合
    description: 多篇研究來源的整合與摘要
    used_by: [templates/sub-agent/research-task.md]

  security_analysis:
    provider: claude
    category: complex_analysis
    rationale: 高精準度需求，不送第三方
    description: 系統安全審查（Cisco AI Defense）
    used_by: [prompts/team/fetch-security.md]

  gmail_processing:
    provider: claude
    category: complex_analysis
    rationale: 個人郵件資料不送第三方 Groq 服務
    description: Gmail 郵件分析（隱私考量）
    used_by: [prompts/team/fetch-gmail.md]

# 批次處理設定
# 注意：delay_between_ms 僅限單一任務內部，跨任務仍可能並行觸發 429
# 若多個自動任務同時段執行，需在排程層級錯開時間（每小時半點執行的 todoist-team）
batch:
  hackernews_articles:
    rule: en_to_zh
    max_items: 5                    # 一次最多翻譯 5 篇
    strategy: sequential            # 逐篇翻譯（避免 429）
    delay_between_ms: 1000          # 篇間延遲增加至 1 秒，配合 rate_limit_per_min: 2

  news_items:
    rule: news_summary
    max_items: 5
    strategy: sequential
    delay_between_ms: 600           # 篇間延遲增加至 600ms，配合 rate_limit_per_min: 2

  kb_scoring:
    rule: kb_content_score
    max_items: 20                   # 單次最多評分 20 筆（低分篩選後）
    strategy: sequential
    delay_between_ms: 15000         # 15 秒/筆 → ~4 req/min（確保不超限）

# 降級策略
fallback:
  groq_unavailable:
    action: skip_and_log            # 跳過 Groq 步驟，記錄 groq_skipped: true
    fallback_to: claude_inline      # Claude 行內處理（不使用 Relay）

  groq_quota_exceeded:
    action: wait_and_retry          # 等待 22 秒後重試一次
    retry_once: true
    then: skip_and_log              # 重試仍失敗則跳過
