  dispatch:
    daily-digest:
      restart_command:
        - "pwsh"
        - "-ExecutionPolicy"
        - "Bypass"
        - "-File"
        - "run-agent-team.ps1"
    todoist:
      restart_command:
        - "pwsh"
        - "-ExecutionPolicy"
        - "Bypass"
        - "-File"
        - "run-todoist-agent-team.ps1"
