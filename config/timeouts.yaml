# config/timeouts.yaml
# 集中管理所有 timeout 值（秒）
# 修改此文件可調整各階段超時，不需動 .ps1 腳本
version: 1

# 每日摘要 - 團隊模式 (run-agent-team.ps1)
daily_digest_team:
  phase1_timeout: 300       # Phase 1: 並行資料擷取
  phase2_timeout: 420       # Phase 2: 摘要組裝
  phase2_max_retries: 1     # Phase 2 重試次數
  retry_base_interval: 60   # 重試基礎間隔（指數退避）
  retry_max_interval: 300   # 重試最大間隔
  retry_jitter_max: 15      # 重試隨機抖動上限

# 每日摘要 - 單一模式 (run-agent.ps1)
daily_digest_single:
  timeout: 900              # 總超時
  max_retries: 1            # 重試次數
  retry_interval: 120       # 重試間隔

# Todoist 任務 - 團隊模式 (run-todoist-agent-team.ps1)
# ADR-018: Phase 2 支援 max 1 retry（僅 timeout）、30s backoff，retry 事件寫入 spans；總 Phase 2 時間最壞約 phase2_timeout + 30 + phase2_timeout
todoist_team:
  phase1_timeout: 420        # Phase 1: 查詢+路由+規劃+寫入 task prompt 檔案（300s 偶爾不足）
  phase1_max_retries: 1      # Phase 1 重試次數（降為 1，避免過長等待）
  phase1_retry_delay_base: 30  # Phase 1 重試間隔基數（秒）
  phase1_retry_delay_jitter: 10  # Phase 1 隨機抖動
  phase3_timeout: 180        # Phase 3: 組裝+通知
  phase3_max_retries: 1      # Phase 3 重試次數
  phase3_retry_base: 60      # Phase 3 重試基礎間隔
  phase3_retry_max: 300      # Phase 3 重試最大間隔
  # Phase 2 動態 timeout（按任務類型）
  phase2_timeout_by_type:
    research: 600   # 研究任務（10 分鐘）
    code: 900       # 程式任務（15 分鐘）
    skill: 300      # Skill 任務（5 分鐘）
    general: 300    # 一般任務（5 分鐘）
    auto: 600       # 自動任務（10 分鐘）
    gitpush: 360    # Git 推送（6 分鐘）
  # Phase 2 動態 timeout（按 auto-task key，優先級高於 phase2_timeout_by_type）
  # 所有 23 個自動任務均有明確 timeout，不再依賴 phase2_timeout_by_type.auto 預設值
  # timeout_seconds in config/frequency-limits.yaml is the single source of truth for human-readable timeouts
  # Values here are kept for backward-compatibility but must stay in sync with frequency-limits.yaml
  phase2_timeout_by_task:
    # === 研究類（Codex 後端，含 WebSearch/WebFetch）===
    tech_research: 2600         # WebSearch×3 + WebFetch×4 + KB 匯入，2026-02-26 超時紀錄
    ai_deep_research: 720       # 4 階段 WebFetch
    unsloth_research: 720       # WebSearch + WebFetch + KB 匯入
    ai_github_research: 900     # GitHub WebSearch×3 + WebFetch + KB（提升：原缺失於 PS1 回落 600s 超時）
    ai_workflow_github: 720     # GitHub workflow research + KB
    ai_smart_city: 600          # domain research（ai-domain-research.md 通用模板）
    ai_sysdev: 600              # domain research（ai-domain-research.md 通用模板）
    shurangama: 1200            # 楞嚴經深題（如五十陰魔）偶發超過 900s，保留更充裕收尾時間
    jiaoguangzong: 1200         # 教觀綱宗會通型主題偶發超過 900s，避免卡在最終寫回
    fahua: 900                  # WebFetch 法華 + KB 匯入
    jingtu: 900                 # WebFetch 淨土 + KB 匯入
    # === 系統類（claude_sonnet45 後端，重 context 任務，已導入 sub-agent）===
    skill_audit: 720            # sub-agent 掃描 26 SKILL.md + KB 搜尋 + 修改建議
    system_insight: 720         # sub-agent 分析 logs/state + 更新 system-insight.json
    arch_evolution: 900         # 讀 improvement-backlog + context/*.json + 架構決策
    self_heal: 1200             # 多步驟修復（registry/快取/排程驗證）+ ntfy（延長：720s 曾超時，步驟 a-i + arch-decision 需充裕時間）
    chatroom_optimize: 480      # sub-agent log 分析 + routing.yaml 調整 + ntfy
    git_push: 600               # git log/diff + 隱私檢查 + commit + push + KB 同步
    log_audit: 720              # sub-agent 讀 10+ log + 分析修正 + KB 匯入
    github_scout: 600           # WebSearch×2 + WebFetch + 分析（無 KB 匯入，輕量）
    # === 創意類 ===
    creative_game_optimize: 900 # sync-games.ps1 npm build 最長 ~15 min
    qa_optimize: 720            # WebSearch CVE + Grep 掃描 + 程式碼修改
    podcast_create: 4000        # 腳本生成 + TTS(40段×~10s) + concat + R2 上傳
    podcast_jiaoguangzong: 4000 # 教觀綱宗 Podcast：30-40 輪 TTS + concat + R2 上傳
    # === Skill 鑄造（claude_sonnet 預設）===
    skill_forge: 900            # 上下文讀取(30s) + 子Agent去重(60s) + KB研究(300s) + Skill生成(120s) + 驗證整合(120s) + 自評分(60s) + 緩衝
    # === ntfy 審查（claude_opus46）===
    ntfy_review: 3000           # 日誌讀取(60s) + 內容情報分析(180s) + 問題修復執行(900s) + 優化落實(900s) + 功能登記(120s) + 報告+通知(120s) + 緩衝（v2.0 即時行動政策）
    # === 未來計畫與洞察評估 ===
    future_plan_optimize: 900   # 讀待辦 + KB 查詢 + 完善細節 + 寫回 MD + 結果 JSON
    kb_insight_evaluation: 1200 # 讀 system-insight + 擇 3 項 + 研究 + 執行方案 + 寫回 improvement-backlog
    workflow_forge: 900         # 掃描 config/prompts + 缺口篩選 + 產物生成 + 驗證 + 整合
    insight_briefing: 900      # 深度研究洞察簡報：多 Skill 串接 + 簡報產出 + KB + ntfy

# Todoist 任務 - 單一模式 (run-todoist-agent.ps1)
todoist_single:
  timeout: 2100             # 總超時

# Gmail Agent (run-gmail-agent.ps1)
gmail:
  timeout: 600              # 總超時
  max_retries: 1            # 重試次數
  retry_interval: 120       # 重試間隔

# 系統審查 - 團隊模式 (run-system-audit-team.ps1)
audit_team:
  phase1_timeout: 600       # Phase 1: 審查 Agent（10 分鐘）
  phase2_timeout: 1200      # Phase 2: 組裝+修正（20 分鐘）
  phase2_max_retries: 1     # Phase 2 重試次數

# FSM 生命週期管理
fsm:
  stale_timeout_hours: 2    # running 狀態超過此時間 → 轉為 timeout（消除殭屍狀態）
  max_entries: 20           # FSM 記錄上限（超過時移除最舊已完成 run）

# 媒體管線工具超時（article-to-video.ps1 / article-to-podcast.ps1）
media_pipeline:
  video_phase1_timeout: 600    # Phase 1: Claude 生成腳本+分鏡稿（KB查詢+分析+寫檔）
  video_phase3_timeout: 1800   # Phase 3: Remotion 渲染（10 分鐘影片約需 3-5 分鐘）
  podcast_phase1_timeout: 1200  # Phase 1: Claude 生成雙主持人對話腳本
  tts_per_segment_timeout: 600  # Phase 2: 每段 TTS 最長等待（edge-tts 通常 <10s）

# 排程式媒體工具 wrapper（run-video-latest-research.ps1 / run-podcast-latest-buddhist.ps1）
media_scheduled:
  kb_search_timeout: 300        # Invoke-RestMethod KB 搜尋超時（秒）
  kb_health_timeout: 300         # KB health check 超時（秒）
  video_total_timeout: 3000    # 影片完整流程（含 Remotion 渲染）
  podcast_total_timeout: 4000  # Podcast 完整流程（含 TTS 所有段落）

# ADR-024：高失敗時段差異化 timeout 配置
# 分析依據：系統審查（2026-03-17）識別 9:00/14:00/15:00 為高失敗時段
# 原因：早晨 API 高峰（9:00）、午後系統負載高峰（14:00）、Todoist 請求密集（15:00）
# 策略：高失敗時段所有 Phase timeout 統一增加 30% buffer
time_slot_profiles:
  # 預設：一般時段（無額外 buffer）
  default:
    phase_buffer_pct: 0        # 無額外增幅
    pre_execution_health_check: false  # 預設不執行前置健康檢查
  # 高失敗時段：+30% timeout buffer + 前置健康檢查
  high_failure_slots:
    - hour: 9                  # 09:00 時段（早晨 API 高峰）
      phase_buffer_pct: 30     # 所有 Phase timeout ×1.3
      pre_execution_health_check: true  # 執行前先 ping KB + Todoist API
      reason: "早晨 API 高峰，外部服務回應時間增加"
    - hour: 14                 # 14:00 時段（午後系統負載高峰）
      phase_buffer_pct: 30
      pre_execution_health_check: true
      reason: "午後系統負載高峰，Windows Task Scheduler 競爭資源"
    - hour: 15                 # 15:00 時段（Todoist 請求密集）
      phase_buffer_pct: 30
      pre_execution_health_check: true
      reason: "午後 Todoist 請求密集，API rate limit 風險較高"
  # 前置健康檢查配置（pre_execution_health_check: true 時執行）
  health_check:
    kb_endpoint: "http://localhost:3000/api/health"  # KB health check
    kb_timeout_sec: 5          # KB ping 超時
    todoist_endpoint: "https://api.todoist.com/api/v1/tasks/filter?query=today"  # Todoist API ping
    todoist_timeout_sec: 8     # Todoist ping 超時
    # 健康檢查失敗策略
    on_kb_failure: "skip_kb_tasks"      # KB 不可用 → 跳過需要 KB 的自動任務
    on_todoist_failure: "skip_phase2"   # Todoist API 不可用 → 跳過 Phase 2，直接 Phase 3 組裝現有結果
    on_both_failure: "abort_and_notify" # 全部不可用 → 中止本次執行 + ntfy 告警

# HEARTBEAT.md 排程超時
scheduler:
  system_audit: 2400        # 00:40 系統審查
  daily_digest_am: 3600     # 08:00 摘要
  daily_digest_mid: 900     # 11:15 摘要
  daily_digest_pm: 3600     # 21:15 摘要
  todoist_single: 2400      # 整點 Todoist
  todoist_team: 3600        # 半點 Todoist（PT1H，含 creative-game 1020s + buffer）
  media_video_research: 2400  # 13:20 影片製作
  media_podcast_buddhist: 4000  # 15:20 Podcast 製作
