# config/scoring.yaml
# TaskSense 優先級計分規則 v2
# 修改此文件可調整排名邏輯，不需碰 prompt

# 配置版本（供未來相容性檢查）
version: 2

# 分數公式說明（實際計算依下方各區塊參數）
formula: "綜合分數 = Todoist 優先級分 × 信心度 × 描述加成 × 時間接近度 × 標籤數量加成 × 近期重複懲罰"
# 每次 run 最多執行的任務數（Phase 2 並行上限）
max_tasks_per_run: 3  # 每次最多執行 3 項

# Todoist priority 對應分數（p1=4 至 p4=1）
priority_scores:
  4: 4  # p1 (priority=4) = 4 分
  3: 3  # p2 = 3 分
  2: 2  # p3 = 2 分
  1: 1  # p4 = 1 分

# 路由層級信心度乘數
confidence_multipliers:
  tier1: 1.0   # 標籤路由（100%）
  tier2: 0.8   # 關鍵字路由（80%）
  tier3: 0.6   # 語義判斷（60%）

# 描述加成
description_bonus:
  has_description: 1.2  # 有 description 欄位
  no_description: 1.0   # 無 description 欄位

# 時間接近度加成（依截止日期距離）
time_proximity_bonus:
  overdue: 1.5     # 已逾期
  today: 1.3       # 今天到期
  tomorrow: 1.1    # 明天到期
  this_week: 1.0   # 本週內到期
  no_due: 0.9      # 無截止日期

# 標籤數量加成（標籤越多代表越被重視）
label_count_bonus:
  0: 1.0    # 無標籤
  1: 1.05   # 1 個標籤
  2: 1.1    # 2 個標籤
  3+: 1.15  # 3 個以上標籤

# 近期重複懲罰（避免同類任務連續佔用）
recency_penalty:
  enabled: true
  description: "今日已完成的相同標籤任務數量越多，後續同標籤任務分數越低"
  overlap_0_1: 1.0   # 今日同標籤已完成 0-1 項：不懲罰
  overlap_2: 0.85    # 今日同標籤已完成 2 項：×0.85
  overlap_3_plus: 0.7  # 今日同標籤已完成 3+ 項：×0.7

# 同分排序規則（Tiebreaker）
tiebreaker:
  description: "綜合分數相同時，依以下順序決定排名"
  order:
    - factor: "due_time_asc"
      description: "截止時間較早者優先（09:00 > 20:00）"
    - factor: "priority_desc"
      description: "Todoist priority 較高者優先（p1 > p2）"
    - factor: "label_count_desc"
      description: "標籤數量較多者優先（代表更被重視）"
    - factor: "task_id_asc"
      description: "Task ID 字典序（最終確定性排序，消除隨機性）"

# 排名輸出格式
output_format: |
  | 排名 | 任務 | 優先級 | 信心度 | 時間 | 標籤數 | 重複 | 綜合分 | 匹配 Skill |
  |------|------|--------|--------|------|--------|------|--------|-----------|
  | 1 | ... | p1 🔴 | 100% | 逾期×1.5 | 3×1.15 | ×1.0 | 7.59 | game-design |
  | 2 | ... | p2 🟡 | 80% | 今天×1.3 | 2×1.1 | ×0.85 | 2.93 | knowledge-query |

# allowedTools 決策表
allowed_tools_table:
  read_only: "Read,Bash"
  create_files: "Read,Bash,Write"
  edit_files: "Read,Bash,Edit"
  full_dev: "Read,Bash,Write,Edit"
  web_search: "Read,Bash,WebSearch,WebFetch"
  full_dev_with_search: "Read,Bash,Write,Edit,Glob,Grep"
  research_kb: "Read,Bash,Write,WebSearch,WebFetch"

# 強制規則（路由與執行時必須遵守，優先於分數排名）
rules:
  - "任務描述含「知識庫」或「RAG」→ allowedTools 必須包含 Write"
  - "依綜合分由高到低執行"
