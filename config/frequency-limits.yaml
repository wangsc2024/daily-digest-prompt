# 系統（claude_sonnet45）：skill_audit(2)+log_audit(2)+git_push(1)+system_insight(2)+arch_evolution(3)+self_heal(2) = 12
# 資產整合：new_asset_onboard(2) = 2
# KB 系統優化（cursor_cli）：kb_system_optimize(1) = 1
# 創意/品質（codex_standard）：creative_game(0)+qa(0)+github_scout(1) = 1
# Podcast（cursor_cli/claude_sonnet45）：podcast_create(2)+podcast_jiaoguangzong(3) = 5
# Chatroom（claude_sonnet45）：chatroom_optimize(0) = 0
# 其他：skill_forge(2)+ntfy_review(1)+future_plan(1)+kb_insight(1) = 5
# 合計：39 次/日（含 daily_limit=0 的暫停任務 3 個：unsloth/creative_game/qa/chatroom；另含 phantom_butterfly_optimize 每日 1 次）

# 歷史追蹤寫入規則
history:
  max_auto_tasks: 200   # auto_tasks 陣列上限，超過移除最舊的
  max_daily_summary: 30  # daily_summary 陣列上限

# 全部自動任務達上限時：先執行排程再通知
# 當 all_exhausted_fallback 存在時，Phase 2 不直接跳過，改為執行該 fallback（如製作 1 集淨土教觀學苑 podcast），再進入 Phase 3 通知
all_exhausted_action: "先執行排程（淨土教觀學苑 podcast 1 集）再通知"
all_exhausted_fallback: "jiaoguang_podcast_one"   # 依 docs/plans/淨土教觀學苑podcast專輯.md 依序製作 1 集
all_exhausted_notify_message: "今日自動任務已達上限故製作1集淨土教觀學苑podcast"
# 排程模型備援：若非 cursor-cli skill 則以 cursor-cli skill 為備援；cursor-cli skill 則以 claude 為備援
all_exhausted_fallback_primary: "claude"   # 優先使用："claude"（article-to-podcast 流程）| "cursor_cli"（cursor-cli skill 模型）
# 備援依規則自動：primary 非 cursor_cli → 備援 cursor_cli；primary 為 cursor_cli → 備援 claude
all_exhausted_fallback_daily_limit: 3     # fallback 每日最多執行 3 集（必須上傳 R2）
