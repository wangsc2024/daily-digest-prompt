# config/cache-policy.yaml
# 統一快取策略 — 所有 Agent 共用
# 操作流程仍依 skills/api-cache/SKILL.md，此文件僅定義 TTL 數值

# 檔案格式版本（保留供未來 schema 變更）
version: 2
# 快取根目錄（相對專案根目錄）
cache_dir: "cache/"
# 降級模式：API 失敗時允許使用過期快取的最長時效（小時）
degradation_max_age_hours: 24  # 降級使用過期快取的最大時效
# 降級時顯示於摘要的標籤模板
degradation_label: "⚠️ 資料來自快取（{time}）"

# 各 API 來源的 TTL 與降級時限（依來源名稱索引）
sources:
  todoist:
    file: "cache/todoist.json"
    ttl_minutes: 45  # 30 → 45（覆蓋整點+半點 30 分鐘間隔）
    degraded_ttl_minutes: 1440  # 降級使用時限（24 小時）
    note: "Todoist Agent 不使用快取（需即時資料），僅 daily-digest 使用"

  pingtung-news:
    file: "cache/pingtung-news.json"
    ttl_minutes: 1080  # kb-system-optimize: 720→1080（18h，命中率 22.7% 低於目標 40%，volatility=low，再延長 TTL）
    degraded_ttl_minutes: 2880  # 降級使用時限（48 小時）

  hackernews:
    file: "cache/hackernews.json"
    ttl_minutes: 360  # ADR-023: 180→360（6h，HN 更新頻率中等，命中率 < 20% 觸發 ×2 調整）
    degraded_ttl_minutes: 1440  # 降級使用時限（24 小時）

  knowledge:
    file: "cache/knowledge.json"
    ttl_minutes: 240  # kb-system-optimize: 120→240（4h，命中率 22.7% 低於目標 40%，volatility=low，倍增 TTL）
    degraded_ttl_minutes: 1440  # 降級使用時限（24 小時）

  gmail:
    file: "cache/gmail.json"
    ttl_minutes: 360  # 30 → 360（6 小時，郵件即時性需求）
    degraded_ttl_minutes: 1440  # 降級使用時限（24 小時）

  chatroom:
    file: "cache/chatroom.json"
    ttl_minutes: 15   # 短 TTL（任務佇列變化快，需即時掌握）
    degraded_ttl_minutes: 120  # 降級使用時限（2 小時）
    note: "bot.js Gun.js 任務佇列快取（G28 整合）"

# 快取檔案結構（所有來源統一格式；Agent 寫入時需符合此 JSON schema）
schema: |
  {
    "cached_at": "ISO-8601 UTC",
    "ttl_minutes": N,
    "source": "來源名稱",
    "data": { ... 原始 API 回應 ... }
  }

# 自適應 TTL 規則（ADR-023：d-TTL 演算法）
# cache-optimizer Skill 每週執行分析後，依此規則調整各端點 TTL
adaptive_ttl:
  enabled: true  # 啟用自適應調整，由 cache-optimizer Skill 執行
  evaluation_window_days: 7  # 評估週期（7 天滑動視窗）
  rules:
    # 命中率低 + 資料穩定 → 延長 TTL
    - condition: "hit_ratio < 0.20 AND volatility == 'low'"
      action: "ttl_minutes *= 2"
      max_ttl_minutes: 1440  # 最長 24h，避免資料過時
      note: "命中率 < 20% 且 volatility=low，倍增 TTL 提升命中率"
    # 命中率高 + 資料易變 → 縮短 TTL
    - condition: "hit_ratio > 0.80 AND volatility == 'high'"
      action: "ttl_minutes /= 2"
      min_ttl_minutes: 15  # 最短 15 分鐘，確保資料新鮮度
      note: "命中率 > 80% 且 volatility=high，半減 TTL 提升資料時效性"
    # 命中率低 + 資料易變 → 不調整（API 限制或查詢不穩定，需人工分析）
    - condition: "hit_ratio < 0.20 AND volatility == 'high'"
      action: "no_change"
      note: "命中率低且 volatility=high，不自動調整，由 cache-optimizer Skill 人工分析"
  volatility:
    # 各端點的資料易變性評估（low=穩定，high=頻繁更新）
    todoist: "high"       # 任務隨時更新
    pingtung-news: "low"  # 每日更新 1-3 次
    hackernews: "medium"  # 每 1-3 小時更新
    knowledge: "low"      # KB 手動更新，極少變化
    gmail: "medium"       # 取決於郵件頻率
    chatroom: "high"      # 任務佇列隨時變化

# 快取命中追蹤（Agent 執行期間維護計數器）
tracking:
  cache_hits: "每次從快取取得有效資料時 +1"
  api_calls: "每次執行外部 curl 呼叫時 +1"
  cache_degraded: "API 失敗且使用過期快取時 +1"
  write_to: "context/digest-memory.json → skill_usage 區塊"
