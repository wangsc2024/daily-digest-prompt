# config/benchmark.yaml
# 系統效能基準線 — 由 system-insight Skill 讀取比對
# 修改此文件可調整目標門檻

version: 2

metrics:
  - name: daily_success_rate
    description: "每日執行成功率"
    target: ">= 95%"
    source: scheduler-state.json
    weight: 25

  - name: avg_phase1_duration
    description: "Phase 1 平均耗時"
    target: "<= 60s"
    source: session-summary.jsonl
    weight: 10

  - name: skill_coverage
    description: "Skill 使用覆蓋率"
    target: ">= 70%"
    source: system-insight.json
    weight: 12

  - name: cache_hit_ratio
    description: "快取命中率"
    target: ">= 40%"
    source: system-insight.json
    weight: 12

  - name: security_rule_count
    description: "安全規則數量"
    target: ">= 15"
    source: hook-rules.yaml
    weight: 8

  - name: test_count
    description: "測試案例數量"
    target: ">= 450"
    source: pytest
    weight: 8

  - name: owasp_coverage
    description: "OWASP Agentic 覆蓋率"
    target: ">= 70%"
    source: manual_assessment
    weight: 5

  # Token 經濟學指標（v2 新增，靈感：everything-claude-code Token Economy）
  - name: avg_io_per_call
    description: "每次工具呼叫平均 I/O 大小（chars）"
    # 合理值說明：多 Agent 並行架構下，研究/摘要任務輸出量大（output:input 比率約 20:1），
    # 實測 7 日均值約 9,000–12,000 chars/call。5000 門檻對單一 Agent 適用，
    # 多 Agent 並行（team-mode）正常範圍為 8,000–12,000；超過 15,000 才需告警。
    target: "<= 12000"
    source: behavior-patterns.json
    weight: 10

  - name: behavior_pattern_count
    description: "已識別行為模式數量（Instinct Lite）"
    target: ">= 20"
    source: behavior-patterns.json
    weight: 5

  - name: high_confidence_patterns
    description: "高信心模式數量（confidence >= 0.5，可演化為 Skill）"
    target: ">= 5"
    source: behavior-patterns.json
    weight: 5

# 配置膨脹警戒閾值（analyze-config.ps1 使用）
config_complexity:
  claude_md_lines_warn: 300      # > 300 行警告（P0-A 優化後基準 ~220 行）
  yaml_total_lines_warn: 3000    # > 3000 行警告
  skill_index_lines_warn: 150    # > 150 行警告（P1-C 優化後基準 ~90 行）
  auto_task_templates_warn: 25   # > 25 個模板警告

# 參考專案比較（github-scout Skill 使用）
comparison:
  reference_projects:
    - name: antigravity-skills
      url: https://github.com/guanyang/antigravity-skills
      strengths: [evidence-based, token-economy, progressive-disclosure]
    - name: openclaw
      url: https://github.com/openclaw/openclaw
      strengths: [self-healing, local-first, shell-integration]
    - name: everything-claude-code
      url: https://github.com/affaan-m/everything-claude-code
      strengths: [instinct-learning, token-economy, agent-hierarchy, agentshield]

# Fitness Functions — 可量化的架構健康指標（P0-B 新增）
# 由 check-health.ps1 [Fitness Function 評分] 區塊讀取
fitness_functions:
  adr_coverage:
    description: "ADR 覆蓋率（Accepted / Total）"
    target: ">= 80%"
    auto_check: true
    measure: "context/adr-registry.json .summary.accepted / .summary.total"
    weight: 20

  hook_precision:
    description: "Hook 攔截精準率（False Positive < 5%）"
    target: "false_positive_rate < 5%"
    measure: "uv run python hooks/query_logs.py --mode precision"
    weight: 20

  ooda_completion:
    description: "OODA 循環完成率（Decide 步驟有輸出）"
    target: ">= 60%"
    source: "logs/structured/ooda-transitions.jsonl"
    weight: 20

  tech_debt_velocity:
    description: "每週解決技術債 >= 新增量"
    target: "resolved >= new_per_week"
    source: "context/improvement-backlog.json"
    weight: 15

  config_entropy:
    description: "配置膨脹分數（analyze-config.ps1 輸出）"
    target: "< 0.65"
    measure: "analyze-config.ps1 -Mode score"
    weight: 15

  groq_routing_ratio:
    description: "Groq 路由佔比（P1-B 啟用後才有意義）"
    target: ">= 10%"
    measure: "state/token-usage.json .daily.<today>.groq_calls / total_calls"
    weight: 10
    enabled_after: "P1-B"   # P1-B 實作前此指標恆為 0，不計入評分

# 迴圈偵測閾值（LoopDetector 讀取）
loop_detection:
  tool_hash_threshold: 5        # 同一工具+參數連續 N 次觸發
  content_hash_threshold: 3     # 相同輸出連續 N 次觸發
  excessive_turns_threshold: 200  # Session 呼叫次數上限（100 → 200）
